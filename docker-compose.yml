# Opic production split:
#   https://opic.fun      → frontend (nginx → 5173 or static dist)
#   https://api.opic.fun  → Stoat API + WebSocket + /attachments
# Set VITE_API_ORIGIN empty for local all-in-one /api proxy (see stoat-frontend/.env.example).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./stoat-js
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 14702
      MONGODB_URI: mongodb://mongo:27017/stoat
      APP_URL: ${APP_URL:-https://opic.fun}
      WS_URL: ${WS_URL:-wss://api.opic.fun/}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://opic.fun,https://www.opic.fun}
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "127.0.0.1:14702:14702"

  frontend:
    build:
      context: ./stoat-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_GIPHY_API_KEY: ${VITE_GIPHY_API_KEY:-}
      VITE_TENOR_API_KEY: ${VITE_TENOR_API_KEY:-}
      VITE_API_ORIGIN: ${VITE_API_ORIGIN:-https://api.opic.fun}
    ports:
      - "127.0.0.1:5173:5173"

volumes:
  mongo_data:
  uploads_data:
