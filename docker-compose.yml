# Opic @ https://opic.fun — production-oriented defaults for Docker + nginx reverse proxy.
# Browser app uses same-origin /api and /ws (see deploy-nginx-opic.fun.conf). Stoat’s gateway path is /
# internally; nginx maps public /ws → backend /, so WS_URL is wss://opic.fun/ws for GET / hints and clients.
# Override any value with a root .env or `export VAR=...` before `docker compose up`.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./stoat-js
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 14702
      MONGODB_URI: mongodb://mongo:27017/stoat
      APP_URL: ${APP_URL:-https://opic.fun}
      WS_URL: ${WS_URL:-wss://opic.fun/ws}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://opic.fun,https://www.opic.fun}
    depends_on:
      - mongo
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "127.0.0.1:14702:14702"

  frontend:
    build:
      context: ./stoat-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_GIPHY_API_KEY: ${VITE_GIPHY_API_KEY:-}
      VITE_TENOR_API_KEY: ${VITE_TENOR_API_KEY:-}
    ports:
      - "127.0.0.1:5173:5173"

volumes:
  mongo_data:
  uploads_data:
