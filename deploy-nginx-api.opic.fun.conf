# Stoat API + WebSocket gateway + uploads — https://api.opic.fun
# Proxies everything to the Node process (Docker backend on 127.0.0.1:14702).
# Gateway WebSocket path is `/` on the Node server (wss://api.opic.fun/?token=...).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name api.opic.fun;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:14702;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
