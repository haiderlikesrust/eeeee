# Web app only — https://opic.fun (and www)
# API + WebSocket + uploads live on api.opic.fun (see deploy-nginx-api.opic.fun.conf).
# Terminate TLS (e.g. certbot) on both server blocks in production.

server {
    listen 80;
    server_name opic.fun www.opic.fun;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
